name: Docker Multi-Arch CI - StreamGrab Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. 1.2.0). Leave empty to only push latest.'
        required: false
        type: string
      skip_release:
        description: 'Build and push Docker image but skip GitHub Release creation'
        required: false
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  packages: write

jobs:
  # ── Phase 1: build per-arch on native runners (no QEMU) ──────────────────────
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.USER_HUB }}
          password: ${{ secrets.PASS_HUB }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=yoniergomez/streamgrab,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Phase 2: merge digests into multi-arch manifest ──────────────────────────
  merge:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.USER_HUB }}
          password: ${{ secrets.PASS_HUB }}

      - name: GHCR Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          TAGS="-t yoniergomez/streamgrab:latest"
          GHCR_TAGS="-t ghcr.io/yoniergomez/streamgrab:latest"
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            TAGS="$TAGS -t yoniergomez/streamgrab:${{ github.event.inputs.version }}"
            GHCR_TAGS="$GHCR_TAGS -t ghcr.io/yoniergomez/streamgrab:${{ github.event.inputs.version }}"
          fi
          DIGESTS=$(printf 'yoniergomez/streamgrab@sha256:%s ' $(ls /tmp/digests))
          docker buildx imagetools create $TAGS $DIGESTS
          docker buildx imagetools create $GHCR_TAGS $DIGESTS

  # ── Phase 3: GitHub Release (only on manual dispatch with version) ────────────
  release:
    needs: merge
    if: github.event.inputs.version != '' && github.event.inputs.skip_release != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTS=$(gh release view "v${{ github.event.inputs.version }}" \
            --repo ${{ github.repository }} 2>/dev/null && echo "true" || echo "false")
          echo "exists=$EXISTS" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ github.event.inputs.version }}"
          VERSION="${{ github.event.inputs.version }}"

          cat > /tmp/release-notes.md << NOTES
          ## StreamGrab Bot ${VERSION}

          ### Docker Images

          \`\`\`bash
          docker pull yoniergomez/streamgrab:latest
          docker pull yoniergomez/streamgrab:${VERSION}
          \`\`\`

          ### Supported Architectures

          | Architecture | Tag |
          |---|---|
          | linux/amd64 | \`latest\`, \`${VERSION}\` |
          | linux/arm64 | \`latest\`, \`${VERSION}\` |

          ### Quick Start

          \`\`\`bash
          docker run -d --name streamgrab \\
            -e BOT_TOKEN=your_token_here \\
            yoniergomez/streamgrab:${VERSION}
          \`\`\`
          NOTES

          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "StreamGrab Bot $VERSION" \
            --notes-file /tmp/release-notes.md
