services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: telegram-bot-api
    restart: always
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  streamgrab:
    build: .
    container_name: streamgrab
    restart: always
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_ID: ${ADMIN_ID:-}
      TELEGRAM_LOCAL: "true"
    depends_on:
      telegram-bot-api:
        condition: service_healthy

volumes:
  telegram-bot-api-data:
